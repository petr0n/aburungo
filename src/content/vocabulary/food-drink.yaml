# ── Question words ───────────────────────────────────────────────────────────

- id: vocab.nani
  jlpt: N5
  word_type: noun
  theme: basics
  japanese: 何
  reading: なに
  romaji: nani
  english: what
  notes: |
    Read なん before です, counters, and some particles (何ですか → なんですか);
    read なに when standalone or before の.

