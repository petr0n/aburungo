# vocab.migi (右/みぎ, right) is owned by vocabulary/directions.yaml — Unit 24
# ("Left, right, straight") is its canonical kanji-teaching point; Unit 19
# here (taxi) uses the same id ahead of that unit in the ladder, kana-only
# in practice since the app doesn't gate word display on kanji-teaching order.

