- id: vocab.fun
  jlpt: N5
  word_type: counter
  theme: transit
  japanese: 分
  reading: ふん
  romaji: fun
  english: minute(s) (counter)
  notes: |
    Becomes ぷん after 1, 3, 4, 6, 8, 10 (いっぷん, さんぷん, よんぷん,
    ろっぷん, はっぷん, じゅっぷん) — the reading given here is the base form.

