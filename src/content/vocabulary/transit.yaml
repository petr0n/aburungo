# N5 transit vocabulary — trains, stations, taxis, buses (Situation 4: Getting
# around, Units 16-20). See docs/plans/02b-n5-units.md for the unit map this
# content is drawn from.
# content-source: training — N5 canonical vocabulary, pending JMdict seed verification
# jlpt-source: training

# ── At the station (Unit 16) ──────────────────────────────────────────────────

- id: vocab.densha
  jlpt: N5
  word_type: noun
  theme: transit
  japanese: 電車
  reading: でんしゃ
  romaji: densha
  english: train

- id: vocab.kippu
  jlpt: N5
  word_type: noun
  theme: transit
  japanese: 切符
  reading: きっぷ
  romaji: kippu
  english: ticket

- id: vocab.made
  jlpt: N5
  word_type: adverb
  theme: transit
  japanese: まで
  reading: まで
  romaji: made
  english: to, until, as far as (marks a destination or limit)
  notes: |
    Grammatically a particle, not a true adverb — "adverb" is the closest
    available word_type since the schema has no dedicated particle category.
    Attaches after a place or time noun (駅まで, 三時まで).

