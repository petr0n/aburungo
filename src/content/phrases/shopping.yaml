# Shopping phrases — stores, prices, payment, and browsing.
# content-source: training — N5 canonical vocabulary, pending JMdict seed verification
# jlpt-source: training

- id: shopping.how-much
  jlpt: N5
  japanese: いくらですか
  reading: いくらですか
  romaji: ikura desu ka
  english: How much is this?
  scenario: shopping

- id: shopping.this-please
  jlpt: N5
  japanese: これをください
  reading: これをください
  romaji: kore o kudasai
  english: This one, please.
  scenario: shopping
  notes: Point at the item — works without any further Japanese.

- id: shopping.just-looking
  jlpt: N5
  japanese: 見ているだけです
  reading: みているだけです
  romaji: mite iru dake desu
  english: I'm just looking.
  scenario: shopping
  notes: |
    Shop staff will greet you with "いらっしゃいませ" when you enter.
    This is the polite reply that lets you browse freely.

- id: shopping.pay-by-card
  jlpt: N5
  japanese: カードで払えますか
  reading: カードではらえますか
  romaji: kaado de haraemasu ka
  english: Can I pay by card?
  scenario: shopping
  notes: Smaller shops and traditional restaurants are often cash only.

- id: shopping.receipt-please
  jlpt: N5
  japanese: レシートをください
  reading: レシートをください
  romaji: reshiito o kudasai
  english: A receipt, please.
  scenario: shopping

- id: shopping.no-bag
  jlpt: N5
  japanese: 袋はいりません
  reading: ふくろはいりません
  romaji: fukuro wa irimasen
  english: No bag needed, thank you.
  scenario: shopping
  notes: |
    Since 2020, plastic bags are charged at most shops. The cashier will
    ask "袋はいりますか?" — this is your reply if you don't need one.

- id: shopping.bigger-size
  jlpt: N5
  japanese: 大きいサイズはありますか
  reading: おおきいサイズはありますか
  romaji: ookii saizu wa arimasu ka
  english: Do you have a larger size?
  scenario: shopping
  notes: Swap 大きい (ookii) for 小さい (chiisai) to ask for a smaller size.

- id: shopping.may-i-look
  jlpt: N5
  japanese: ちょっと見てもいいですか
  reading: ちょっとみてもいいですか
  romaji: chotto mite mo ii desu ka
  english: May I have a look?
  scenario: shopping
  notes: The standard way to browse without committing — ～てもいいですか is the general "may I ~?" permission pattern.

- id: shopping.big-one-please
  jlpt: N5
  japanese: 大きいのをください
  reading: おおきいのをください
  romaji: ookii no o kudasai
  english: The big one, please.
  scenario: shopping
  notes: の stands in for the item already pointed at — swap 大きい for 小さい to ask for the small one.

- id: shopping.two-please
  jlpt: N5
  japanese: ふたつください
  reading: ふたつください
  romaji: futatsu kudasai
  english: Two, please.
  scenario: shopping
  notes: Native counter (ひとつ、ふたつ、みっつ...) — works for most small countable items without needing a specific counter word.

- id: shopping.other-colors
  jlpt: N5
  japanese: ほかのいろはありますか
  reading: ほかのいろはありますか
  romaji: hoka no iro wa arimasu ka
  english: Do you have other colors?
  scenario: shopping
  notes: ～はありますか is the general "do you have ~?" stock question — swap いろ for another noun to ask about other attributes.

- id: shopping.dont-have-it
  jlpt: N5
  japanese: すみません、ありません
  reading: すみません、ありません
  romaji: sumimasen, arimasen
  english: I'm sorry, we don't have it.
  scenario: shopping
  notes: The clerk's typical reply when an item is out of stock.
