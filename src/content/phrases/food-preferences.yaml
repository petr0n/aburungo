# Food preferences — saying what you like, dislike, and want to eat/drink,
# plus daily-life frequency phrases for the integration units.
# See docs/plans/02b-n5-units.md, Situation 8 and Units 33-35.
# content-source: training — N5 canonical vocabulary, pending JMdict seed verification
