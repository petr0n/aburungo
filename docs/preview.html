<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AburunGo Docs</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #111827; line-height: 1.6; }
  #content { max-width: 860px; margin: 0 auto; padding: 48px 32px 80px; background: #fff; min-height: 100vh; }
  h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: #111827; }
  h2 { font-size: 1.35rem; font-weight: 600; margin: 40px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #e5e7eb; color: #111827; }
  h3 { font-size: 1.05rem; font-weight: 600; margin: 24px 0 8px; color: #374151; }
  h4 { font-size: 0.95rem; font-weight: 600; margin: 20px 0 6px; color: #374151; }
  p { margin-bottom: 14px; color: #374151; }
  ul, ol { margin: 8px 0 14px 24px; }
  li { margin-bottom: 4px; color: #374151; }
  li input[type="checkbox"] { margin-right: 6px; }
  table { width: 100%; border-collapse: collapse; margin: 16px 0 24px; font-size: 0.9rem; }
  th { background: #f3f4f6; text-align: left; padding: 10px 14px; border: 1px solid #e5e7eb; font-weight: 600; color: #111827; }
  td { padding: 9px 14px; border: 1px solid #e5e7eb; color: #374151; vertical-align: top; }
  tr:nth-child(even) td { background: #f9fafb; }
  code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85em; background: #f3f4f6; padding: 2px 5px; border-radius: 4px; color: #7c3aed; }
  pre { background: #1e1e2e; color: #cdd6f4; padding: 16px 20px; border-radius: 10px; overflow-x: auto; margin: 12px 0 20px; font-size: 0.85rem; line-height: 1.5; }
  pre code { background: none; color: inherit; padding: 0; }
  blockquote { border-left: 3px solid #7c3aed; margin: 12px 0; padding: 8px 16px; background: #faf5ff; color: #4b5563; font-style: italic; border-radius: 0 6px 6px 0; }
  hr { border: none; border-top: 1px solid #e5e7eb; margin: 32px 0; }
  strong { color: #111827; }
  a { color: #7c3aed; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="content">Loading…</div>
<script>
  const file = new URLSearchParams(location.search).get('file') || 'testing.md';
  fetch(file)
    .then(r => r.text())
    .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
      document.querySelectorAll('li').forEach(li => {
        li.innerHTML = li.innerHTML.replace(/\[ \]/g, '<input type="checkbox" disabled>').replace(/\[x\]/gi, '<input type="checkbox" checked disabled>');
      });
    });
</script>
</body>
</html>
